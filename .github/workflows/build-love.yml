name: Build .love

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Create .love package
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p release
        cd "$GITHUB_WORKSPACE"
        rm -f release/game.zip release/game.love
        # Collect top-level entries that do NOT start with a dot
        mapfile -d '' -t entries < <(find . -maxdepth 1 -mindepth 1 ! -name '.*' -print0)
        if [ ${#entries[@]} -eq 0 ]; then
          echo "No non-dotfiles found to package. Exiting."
          exit 1
        fi
        zip -r release/game.zip "${entries[@]}"
        mv release/game.zip release/game.love
        ls -la release

    - name: Upload .love artifact
      uses: actions/upload-artifact@v4
      with:
        name: game-love
        path: release/game.love
